<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자야쌤 콘텐츠 공장</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">

    <header class="site-header">
      <h1 class="logo">자야쌤 콘텐츠 공장</h1>
      <p class="tagline">비메오 강의 URL 하나로 카페·인스타·캐러셀 4종 즉시 생성</p>
    </header>

    <div id="status-bar" class="status-bar" hidden></div>

    <section class="input-panel">
      <div class="input-row">
        <input id="url-input" type="url" class="input-url"
          placeholder="https://vimeo.com/..."
          autocomplete="off" spellcheck="false" />
        <input id="topic-input" type="text" class="input-topic"
          placeholder="강의 주제 (선택)"
          autocomplete="off" />
      </div>
      <button id="generate-btn" class="btn btn-primary">생성 시작</button>
    </section>

    <!-- 지난 작업 히스토리 -->
    <section id="history-panel" class="history-panel" hidden>
      <div class="history-head">
        <h2 class="history-title">지난 작업</h2>
        <span class="history-count" id="history-count"></span>
      </div>
      <ul id="history-list" class="history-list"></ul>
    </section>

    <main id="results" hidden>
      <div class="sections-grid">

        <!-- 카페 서머리 -->
        <article class="content-card" id="card-cafe" data-type="cafe">
          <div class="card-header">
            <span class="card-title">네이버 카페 서머리</span>
            <span class="char-count" id="count-cafe"></span>
            <button class="btn btn-copy" data-target="cafe" disabled>복사</button>
          </div>
          <div class="card-body" id="body-cafe">
            <div class="skeleton-wrap">
              <div class="spinner"></div>
              <p class="loading-text">생성 중…</p>
            </div>
          </div>
          <div class="revision-row" id="revision-cafe" hidden>
            <input type="text" id="revise-cafe" class="input-revise"
              placeholder="수정 요청 (예: 첫 문단 더 따뜻하게)" />
            <button class="btn btn-revise" data-type="cafe" disabled>재생성</button>
          </div>
        </article>

        <!-- 인스타 캡션 -->
        <article class="content-card" id="card-caption" data-type="caption">
          <div class="card-header">
            <span class="card-title">인스타 캡션</span>
            <span class="char-count" id="count-caption"></span>
            <button class="btn btn-copy" data-target="caption" disabled>복사</button>
          </div>
          <div class="card-body" id="body-caption">
            <div class="skeleton-wrap">
              <div class="spinner"></div>
              <p class="loading-text">생성 중…</p>
            </div>
          </div>
          <div class="revision-row" id="revision-caption" hidden>
            <input type="text" id="revise-caption" class="input-revise"
              placeholder="수정 요청 (예: CTA 부분 다시)" />
            <button class="btn btn-revise" data-type="caption" disabled>재생성</button>
          </div>
        </article>

        <!-- 캐러셀 기획 -->
        <article class="content-card" id="card-carousel" data-type="carousel">
          <div class="card-header">
            <span class="card-title">인스타 캐러셀 기획</span>
            <button class="btn btn-copy" data-target="carousel" disabled>복사</button>
          </div>
          <div class="card-body" id="body-carousel">
            <div class="skeleton-wrap">
              <div class="spinner"></div>
              <p class="loading-text">생성 중…</p>
            </div>
          </div>
        </article>

        <!-- 캡쳐 가이드 -->
        <article class="content-card" id="card-capture" data-type="capture">
          <div class="card-header">
            <span class="card-title">캡쳐 가이드</span>
            <button class="btn btn-copy" data-target="capture" disabled>복사</button>
          </div>
          <div class="card-body" id="body-capture">
            <div class="skeleton-wrap">
              <div class="spinner"></div>
              <p class="loading-text">생성 중…</p>
            </div>
          </div>
        </article>

      </div><!-- .sections-grid -->

      <div id="regen-row" class="regen-row" hidden>
        <p class="regen-hint">카페 서머리·캡션을 확정하셨나요?</p>
        <button id="regen-btn" class="btn btn-secondary">
          캐러셀·캡쳐 가이드 재생성
        </button>
        <button id="save-notion-btn" class="btn btn-notion">
          노션에 저장
        </button>
      </div>

    </main><!-- #results -->

    <footer class="site-footer">
      <button id="exchange-token-btn" class="btn btn-ghost">Instagram 토큰 교환</button>
      <button id="learn-voice-btn" class="btn btn-ghost">보이스 프로파일 갱신</button>
      <button id="learn-voice-manual-btn" class="btn btn-ghost">캡션 직접 입력</button>
    </footer>

    <div id="manual-caption-modal" class="modal-overlay" hidden>
      <div class="modal-box">
        <h2 class="modal-title">인스타 캡션 직접 입력</h2>
        <p class="modal-desc">자야쌤 인스타 캡션을 복사해서 붙여넣으세요.<br>캡션 사이는 <strong>빈 줄</strong>로 구분합니다. 10개 이상 권장.</p>
        <textarea id="manual-captions-input" class="caption-textarea" placeholder="첫 번째 캡션...

두 번째 캡션...

세 번째 캡션..."></textarea>
        <div class="modal-actions">
          <button id="manual-caption-submit" class="btn btn-primary">학습 시작</button>
          <button id="manual-caption-cancel" class="btn btn-ghost">취소</button>
        </div>
      </div>
    </div>

  </div><!-- .wrap -->
  <script src="app.js"></script>
</body>
</html>
